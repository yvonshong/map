# .github/workflows/run-on-push.yml

name: Build and Deploy to GitHub Pages

# 触发条件：当有代码推送到 main 分支时
on:
  push:
    branches:
      - main

# 允许此工作流写入 git 仓库
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 第一步：检出您的代码库的 main 分支
      - name: Checkout repository
        uses: actions/checkout@v4

      # 第二步：设置 Python 环境
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 第三步：安装 Python 依赖包
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip3 install requests tqdm pandas openpyxl xlrd

      # 第四步：运行 Python 脚本以生成文件
      - name: Run Python script to generate files
        run: |
          python3 geocode_script/geocode_locations.py
          python3 geocode_script/parse_flights.py

      # 第五步：将更新后的缓存保存回 main 分支
      - name: Commit and push cache to main
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add geocode_script/city_gps.json
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-update geocode cache [skip ci]"
            git push
          else
            echo "No changes to cache."
          fi

      # 第六步：将生成的文件部署到 gh-pages 分支
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          # GITHUB_TOKEN 是由 GitHub Actions 自动创建的，用于授权
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 要发布到 gh-pages 分支的目录
          # 发布根目录，包含 index.html, map.js, data/, style.css 等
          publish_dir: ./


